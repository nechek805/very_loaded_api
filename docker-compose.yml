services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    user: "1000:1000"
    env_file:
      - .env
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
    command: uv run uvicorn src.main:app --host 0.0.0.0 --port 8000

  worker:
    build: .
    volumes:
      - .:/app
    user: "1000:1000"
    env_file:
      - .env
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
    command: uv run celery -A src.celery_app:app worker --loglevel=info

  rabbitmq:
    image: rabbitmq:4-management
    ports:
      - "5672:5672" # AMQP
      - "15672:15672" # RabbitMQ UI 
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres:
    image: postgres:17-alpine
    ports:
      - "${POSTGRES_PORT}:${POSTGRES_PORT}"
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgres/data
    healthcheck:
      test: ["CMD_SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data: